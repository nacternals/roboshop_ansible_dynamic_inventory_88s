env_name: dev

roboshop_app_dir: /app
roboshop_log_dir: "{{ roboshop_app_dir }}/log"

roboshop_password_plain: RoboShop@1

mongo_port: 27017
redis_port: 6379
mysql_port: 3306
rabbitmq_port: 5672

roboshop_app_port: 8080
internal_alb_port: 80

# db tier
mongo_host: mongodb.dev.optimusprime.uno
redis_host: redis.dev.optimusprime.uno
