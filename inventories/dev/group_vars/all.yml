shipping_host: shipping.dev.optimusprime.uno
payment_host: payment.dev.optimusprime.uno
dispatch_host: dispatch.dev.optimusprime.uno

# web tier
web_host: web.dev.optimusprime.uno

# app access ports via internal ALB
catalogue_port: "{{ internal_alb_port }}"
cart_port: "{{ internal_alb_port }}"
user_port: "{{ internal_alb_port }}"
shipping_port: "{{ internal_alb_port }}"
