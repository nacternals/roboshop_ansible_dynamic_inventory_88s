plugin: amazon.aws.aws_ec2
regions:
  - us-east-1

filters:
  tag:Project: roboshop
  tag:Environment: dev
  instance-state-name: running

hostnames:
  - private-ip-address

compose:
  ansible_host: private_ip_address

keyed_groups:
  - key: tags.Tier
    prefix: tier
  - key: tags.Component
    prefix: comp
