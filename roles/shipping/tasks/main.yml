---
# tasks file for shipping
#Setting-up Roboshop Application Basic Requirements
- name: Run Roboshop Basic Application Requirements (from common to shipping microservice)
  ansible.builtin.import_role:
    name: common
    tasks_from: roboshop_basic_requirements.yml

#Setting-up Maven and Java and MySQL Client
- name: Installing Maven and Java and MySQL Client
  ansible.builtin.package:
    name: "{{ shipping_packages }}"
    state: present

#Setting-up Shipping Microservice Application Code
- name: Downloading and Unzipping Shipping Microservice Application Code
  ansible.builtin.import_role:
    name: common
    tasks_from: download_unzip_service.yml
  vars:
    component: shipping
    app_dir: /app
    artifact_dest: /tmp/shipping.zip

- name: Downloading Shipping Application Dependencies and Building Application Jar
  ansible.builtin.command: "mvn clean package"
  args:
    chdir: /app

- name: Renaming Shipping Application Jar
  ansible.builtin.command: "mv target/shipping-1.0.jar shipping.jar"
  args:
    chdir: /app

#Setting-up Shipping Microservice systemd Service
- name: Copying Shipping Service File (shipping.service.j2) to /etc/systemd/system/shipping.service
  ansible.builtin.template:
    src: shipping.service.j2
    dest: /etc/systemd/system/shipping.service
  notify: Reload systemd daemon

- name: Run handlers now (reload systemd before starting service)
  ansible.builtin.meta: flush_handlers

- name: Enabling and Staring Shipping Service
  ansible.builtin.import_role:
    name: common
    tasks_from: enable_start_service.yml

#Loading Shipping Schema into MySQL Database
# -------------------------------
# Loading Shipping Schema into MySQL (Idempotent)
# DB: cities
# Base table from schema.sql: cities
# Marker table: schema_migrations
# -------------------------------

- name: Ensure schema_migrations table exists (marker table)
  ansible.builtin.shell: >
    mysql -h {{ mysql_host }} -uroot -pRoboShop@1 -e "
    USE cities;
    CREATE TABLE IF NOT EXISTS schema_migrations (
      id INT PRIMARY KEY AUTO_INCREMENT,
      name VARCHAR(255) UNIQUE,
      applied_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );"
  changed_when: false
  no_log: true

- name: Check if shipping DB already loaded (marker row)
  ansible.builtin.shell: >
    mysql -h {{ mysql_host }} -uroot -pRoboShop@1 -N -s -e "
    USE cities;
    SELECT COUNT(*) FROM schema_migrations WHERE name='shipping_db_loaded';"
  register: shipping_schema_check
  changed_when: false
  no_log: true

- name: Load Shipping DB SQL files into MySQL (one-time)
  ansible.builtin.shell: >
    mysql -h {{ mysql_host }} -uroot -pRoboShop@1 < {{ item }}
  args:
    chdir: /app/db
    executable: /bin/bash
  loop:
    - schema.sql
    - app-user.sql
    - master-data.sql
  when: shipping_schema_check.stdout | int == 0
  no_log: true
  notify: Restart Shipping Service

- name: Mark shipping DB as loaded (so next runs skip)
  ansible.builtin.shell: >
    mysql -h {{ mysql_host }} -uroot -pRoboShop@1 -e "
    USE cities;
    INSERT IGNORE INTO schema_migrations(name) VALUES ('shipping_db_loaded');"
  when: shipping_schema_check.stdout | int == 0
  changed_when: true
  no_log: true