---
# roles/shipping/tasks/main.yml
# tasks file for shipping

# ------------------------------------------------------------
# 1) Basic Roboshop requirements
# ------------------------------------------------------------
- name: Run Roboshop Basic Application Requirements (from common to shipping microservice)
  ansible.builtin.import_role:
    name: common
    tasks_from: roboshop_basic_requirements.yml

# ------------------------------------------------------------
# 2) Packages (Java, Maven, MySQL client)
# ------------------------------------------------------------
- name: Installing Maven, Java and MySQL Client
  ansible.builtin.package:
    name: "{{ shipping_packages }}"
    state: present

# ------------------------------------------------------------
# 3) App code download + build
# ------------------------------------------------------------
- name: Downloading and Unzipping Shipping Microservice Application Code
  ansible.builtin.import_role:
    name: common
    tasks_from: download_unzip_service.yml
  vars:
    component: shipping
    app_dir: /app
    artifact_dest: /tmp/shipping.zip
    artifact_url: "{{ artifact_url }}"

- name: Ensure /app ownership is roboshop
  ansible.builtin.file:
    path: /app
    state: directory
    owner: roboshop
    group: roboshop
    recurse: true

- name: Downloading Shipping Application Dependencies and Building Application Jar
  ansible.builtin.command: mvn clean package
  args:
    chdir: /app
    creates: /app/target/shipping-1.0.jar

- name: Renaming Shipping Application Jar
  ansible.builtin.command: mv target/shipping-1.0.jar shipping.jar
  args:
    chdir: /app
    creates: /app/shipping.jar

# ------------------------------------------------------------
# 4) Systemd service
# ------------------------------------------------------------
- name: Copying Shipping Service File (shipping.service.j2) to /etc/systemd/system/shipping.service
  ansible.builtin.template:
    src: shipping.service.j2
    dest: /etc/systemd/system/shipping.service
    mode: "0644"
  notify: Reload systemd daemon

- name: Run handlers now (reload systemd before DB load)
  ansible.builtin.meta: flush_handlers

# ------------------------------------------------------------
# 5) Load Shipping DB into MySQL (RUN ONCE + IDEMPOTENT)
#    DB: cities
# ------------------------------------------------------------
- name: Wait for MySQL port (3306) to be reachable
  ansible.builtin.wait_for:
    host: "{{ mysql_host }}"
    port: 3306
    timeout: 60
  run_once: true

- name: Test MySQL login (root) from shipping node
  ansible.builtin.command: >
    mysql -h {{ mysql_host }} -uroot -p{{ mysql_root_password }} -e "SELECT 1;"
  register: mysql_login_test
  changed_when: false
  run_once: true

- name: Ensure cities database exists
  ansible.builtin.command: >
    mysql -h {{ mysql_host }} -uroot -p{{ mysql_root_password }}
    -e "CREATE DATABASE IF NOT EXISTS cities;"
  changed_when: false
  run_once: true

- name: Ensure schema_migrations table exists (marker table)
  ansible.builtin.command: >
    mysql -h {{ mysql_host }} -uroot -p{{ mysql_root_password }} cities
    -e "CREATE TABLE IF NOT EXISTS schema_migrations
        (id INT PRIMARY KEY AUTO_INCREMENT,
         name VARCHAR(255) UNIQUE,
         applied_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP);"
  changed_when: false
  run_once: true

- name: Check if shipping DB already loaded (marker row)
  ansible.builtin.command: >
    mysql -h {{ mysql_host }} -uroot -p{{ mysql_root_password }} -N -s cities
    -e "SELECT COUNT(*) FROM schema_migrations WHERE name='shipping_db_loaded';"
  register: shipping_schema_check
  changed_when: false
  run_once: true

- name: Load schema.sql into MySQL
  ansible.builtin.shell: >
    mysql -h {{ mysql_host }} -uroot -p{{ mysql_root_password }} < /app/db/schema.sql
  args:
    executable: /bin/bash
  when: (shipping_schema_check.stdout | int) == 0
  run_once: true

- name: Load app-user.sql into MySQL
  ansible.builtin.shell: >
    mysql -h {{ mysql_host }} -uroot -p{{ mysql_root_password }} < /app/db/app-user.sql
  args:
    executable: /bin/bash
  when: (shipping_schema_check.stdout | int) == 0
  run_once: true

- name: Load master-data.sql into MySQL
  ansible.builtin.shell: >
    mysql -h {{ mysql_host }} -uroot -p{{ mysql_root_password }} < /app/db/master-data.sql
  args:
    executable: /bin/bash
  when: (shipping_schema_check.stdout | int) == 0
  run_once: true
  notify: Restart shipping

- name: Mark shipping DB as loaded (so next runs skip)
  ansible.builtin.command: >
    mysql -h {{ mysql_host }} -uroot -p{{ mysql_root_password }} cities
    -e "INSERT IGNORE INTO schema_migrations(name) VALUES ('shipping_db_loaded');"
  when: (shipping_schema_check.stdout | int) == 0
  changed_when: true
  run_once: true

# ------------------------------------------------------------
# 6) Start Shipping Service AFTER DB load
# ------------------------------------------------------------
- name: Enabling and Starting Shipping Service
  ansible.builtin.import_role:
    name: common
    tasks_from: enable_start_service.yml
  vars:
    service_name: shipping

- name: Flush handlers (restart shipping if DB loaded)
  ansible.builtin.meta: flush_handlers