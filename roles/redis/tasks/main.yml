---
# roles/redis/tasks/main.yml

# ------------------------------
# Basic prerequisites (common)
# ------------------------------
- name: Run Roboshop Application Basic Requirements (from common to redis)
  ansible.builtin.import_role:
    name: common
    tasks_from: roboshop_basic_requirements.yml

# ------------------------------
# Install Redis (no module streams)
# ------------------------------
- name: Install Redis
  ansible.builtin.import_role:
    name: common
    tasks_from: package_installer.yml
  vars:
    package_name: redis

# ------------------------------
# Configure Redis for network access
# ------------------------------
# NOTE:
# - For RoboShop, Redis usually needs to be reachable from app tier.
# - If you want ONLY localhost, set redis_bind=127.0.0.1 and keep protected-mode yes.

- name: Configure Redis bind address
  ansible.builtin.lineinfile:
    path: /etc/redis/redis.conf
    regexp: '^bind\s+'
    line: "bind {{ redis_bind }}"
    backrefs: false

- name: Configure Redis protected-mode
  ansible.builtin.lineinfile:
    path: /etc/redis/redis.conf
    regexp: '^protected-mode\s+'
    line: "protected-mode {{ redis_protected_mode }}"
    backrefs: false

# ------------------------------
# Enable and start Redis
# ------------------------------
- name: Enable and start Redis service
  ansible.builtin.import_role:
    name: common
    tasks_from: enable_start_service.yml
  vars:
    service_name: redis

# ------------------------------
# Restart Redis if config changed
# ------------------------------
- name: Restart Redis
  ansible.builtin.service:
    name: redis
    state: restarted

# ------------------------------
# Quick validation
# ------------------------------
- name: Check Redis ping
  ansible.builtin.command: redis-cli ping
  register: redis_ping
  changed_when: false

- name: Show Redis ping output
  ansible.builtin.debug:
    msg: "{{ redis_ping.stdout }}"