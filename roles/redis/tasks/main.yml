---
# roles/redis/tasks/main.yml

- name: Run Roboshop Application Basic Requirements (from common to redis)
  ansible.builtin.import_role:
    name: common
    tasks_from: roboshop_basic_requirements.yml

- name: Install Redis
  ansible.builtin.import_role:
    name: common
    tasks_from: package_installer.yml
  vars:
    package_name: redis

# ------------------------------
# Detect Redis config file path
# ------------------------------
- name: Check /etc/redis/redis.conf
  ansible.builtin.stat:
    path: /etc/redis/redis.conf
  register: redis_conf1

- name: Check /etc/redis.conf
  ansible.builtin.stat:
    path: /etc/redis.conf
  register: redis_conf2

- name: Set redis_config_file fact
  ansible.builtin.set_fact:
    redis_config_file: >-
      {{
        '/etc/redis/redis.conf' if redis_conf1.stat.exists
        else '/etc/redis.conf' if redis_conf2.stat.exists
        else ''
      }}

- name: Fail if Redis config file not found
  ansible.builtin.fail:
    msg: "Redis config file not found. Checked /etc/redis/redis.conf and /etc/redis.conf"
  when: redis_config_file == ''

# ------------------------------
# Configure Redis for network access
# ------------------------------
- name: Configure Redis bind address
  ansible.builtin.lineinfile:
    path: "{{ redis_config_file }}"
    regexp: '^bind\s+'
    line: "bind {{ redis_bind }}"
  notify: Restart redis

- name: Configure Redis protected-mode
  ansible.builtin.lineinfile:
    path: "{{ redis_config_file }}"
    regexp: '^protected-mode\s+'
    line: "protected-mode {{ redis_protected_mode }}"
  notify: Restart redis

# ------------------------------
# Enable & start service
# ------------------------------
- name: Enable and start Redis service
  ansible.builtin.import_role:
    name: common
    tasks_from: enable_start_service.yml
  vars:
    service_name: redis

# ------------------------------
# Validation
# ------------------------------
- name: Check Redis ping
  ansible.builtin.command: redis-cli ping
  register: redis_ping
  changed_when: false

- name: Show Redis ping output
  ansible.builtin.debug:
    msg: "{{ redis_ping.stdout }}"