---
- name: Set defaults for download/unzip
  ansible.builtin.set_fact:
    app_dir: "{{ app_dir | default('/app') }}"
    artifact_dest: "{{ artifact_dest | default('/tmp/' ~ component ~ '.zip') }}"

- name: Validate artifact_url is provided
  ansible.builtin.fail:
    msg: "artifact_url must be provided for component {{ component }}"
  when: artifact_url is not defined or artifact_url | length == 0

- name: Download {{ component }} artifact
  ansible.builtin.get_url:
    url: "{{ artifact_url }}"
    dest: "{{ artifact_dest }}"
    mode: "0644"
    force: true
    timeout: 60

- name: Remove application directory completely (clean)
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: absent

- name: Recreate application directory
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: roboshop
    group: roboshop
    mode: "0755"

- name: Unzip {{ component }} into {{ app_dir }}
  ansible.builtin.unarchive:
    src: "{{ artifact_dest }}"
    dest: "{{ app_dir }}"
    remote_src: true