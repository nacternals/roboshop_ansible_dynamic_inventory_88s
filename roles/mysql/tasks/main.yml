---
# tasks file for mysql

# ------------------------------------------------------------
# 1) Roboshop Basic Requirements
# ------------------------------------------------------------
- name: Run Roboshop Application Basic Requirements (from common to mysql microservice)
  ansible.builtin.import_role:
    name: common
    tasks_from: roboshop_basic_requirements.yml

# ------------------------------------------------------------
# 2) MySQL 8 Repo
# ------------------------------------------------------------
- name: Copying MySQL Repo File as /etc/yum.repos.d/mysql.repo
  ansible.builtin.copy:
    src: mysql.repo
    dest: /etc/yum.repos.d/mysql.repo
    owner: root
    group: root
    mode: "0644"

# ------------------------------------------------------------
# 3) Disable MySQL module (Fix for modular filtering error)
# ------------------------------------------------------------
- name: Disable default MySQL module
  ansible.builtin.command: dnf module disable mysql -y
  changed_when: false
  failed_when: false

# ------------------------------------------------------------
# 4) Install MySQL Server
# ------------------------------------------------------------
- name: Installing MySQL
  ansible.builtin.import_role:
    name: common
    tasks_from: package_installer.yml
  vars:
    package_name: mysql-community-server

# ------------------------------------------------------------
# 5) Enable + Start MySQL Service
# ------------------------------------------------------------
- name: Enabling and Starting MySQL Database Service
  ansible.builtin.import_role:
    name: common
    tasks_from: enable_start_service.yml
  vars:
    service_name: mysqld

# ------------------------------------------------------------
# 6) Check if MySQL root password already set
# ------------------------------------------------------------
- name: Check if MySQL root password is already set
  ansible.builtin.shell: |
    mysql -uroot -p'RoboShop@1' -e "SELECT 1;" >/dev/null 2>&1
  register: mysql_root_pwd_check
  changed_when: false
  failed_when: false

# ------------------------------------------------------------
# 7) Set MySQL root password (first-time setup)
# ------------------------------------------------------------
- name: Set MySQL root password (first-time setup)
  ansible.builtin.shell: |
    mysql -uroot <<'SQL'
    ALTER USER 'root'@'localhost' IDENTIFIED BY 'RoboShop@1';
    FLUSH PRIVILEGES;
    SQL
  when: mysql_root_pwd_check.rc != 0

# ------------------------------------------------------------
# 8) Ensure mysql_native_password plugin (compatibility)
# ------------------------------------------------------------
- name: Ensure root uses mysql_native_password (MySQL 8 compatibility)
  ansible.builtin.shell: |
    mysql -uroot -p'RoboShop@1' <<'SQL'
    ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY 'RoboShop@1';
    FLUSH PRIVILEGES;
    SQL
  when: mysql_root_pwd_check.rc == 0