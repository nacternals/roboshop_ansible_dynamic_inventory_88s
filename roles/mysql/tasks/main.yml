---
# roles/mysql/tasks/main.yml
# tasks file for mysql (RoboShop)

# ------------------------------
# Basic prerequisites (common)
# ------------------------------
- name: Run Roboshop Application Basic Requirements (from common to mysql)
  ansible.builtin.import_role:
    name: common
    tasks_from: roboshop_basic_requirements.yml

# ------------------------------
# MySQL repo + install
# ------------------------------
- name: Disable MySQL default module stream
  ansible.builtin.command: dnf module disable mysql -y
  changed_when: false

- name: Copy MySQL repo file
  ansible.builtin.copy:
    src: mysql.repo
    dest: /etc/yum.repos.d/mysql.repo
    owner: root
    group: root
    mode: "0644"

- name: Install MySQL server (5.7 from mysql.repo)
  ansible.builtin.import_role:
    name: common
    tasks_from: package_installer.yml
  vars:
    package_name: mysql-community-server

- name: Enable and start MySQL service
  ansible.builtin.import_role:
    name: common
    tasks_from: enable_start_service.yml
  vars:
    service_name: mysqld

# ------------------------------
# Set root password (idempotent)
# ------------------------------
- name: Check if MySQL root password is already set to desired value
  ansible.builtin.command: mysqladmin -uroot -p'{{ mysql_root_password }}' ping
  register: mysql_root_pw_check
  changed_when: false
  failed_when: false

- name: Set MySQL root password (first-time only)
  ansible.builtin.command: mysql_secure_installation --set-root-pass '{{ mysql_root_password }}'
  when: mysql_root_pw_check.rc != 0

# ------------------------------
# MySQL network configuration
# ------------------------------
- name: Ensure MySQL bind-address is 0.0.0.0
  ansible.builtin.lineinfile:
    path: /etc/my.cnf
    regexp: '^\s*bind-address\s*='
    line: 'bind-address=0.0.0.0'
    insertafter: '^\[mysqld\]'
  notify: Restart mysqld

- name: Remove skip-networking if present
  ansible.builtin.lineinfile:
    path: /etc/my.cnf
    regexp: '^\s*skip-networking'
    state: absent
  notify: Restart mysqld

- name: Flush handlers so mysqld restarts before root grants
  ansible.builtin.meta: flush_handlers

# ------------------------------
# Verify MySQL is responding
# ------------------------------
- name: Verify MySQL is up (with root password)
  ansible.builtin.command: mysqladmin -uroot -p'{{ mysql_root_password }}' ping
  register: mysql_ping
  changed_when: false

# ------------------------------
# Allow remote root login from app subnet
# Example mysql_root_host_pattern: 10.10.%
# ------------------------------
- name: Create remote root user for app subnet
  ansible.builtin.command: >
    mysql -uroot -p{{ mysql_root_password }} -e
    "CREATE USER IF NOT EXISTS 'root'@'{{ mysql_root_host_pattern }}'
    IDENTIFIED BY '{{ mysql_root_password }}';"
  changed_when: false

- name: Grant privileges to remote root user for app subnet
  ansible.builtin.command: >
    mysql -uroot -p{{ mysql_root_password }} -e
    "GRANT ALL PRIVILEGES ON *.* TO 'root'@'{{ mysql_root_host_pattern }}'
    WITH GRANT OPTION;"
  changed_when: false

- name: Flush MySQL privileges
  ansible.builtin.command: >
    mysql -uroot -p{{ mysql_root_password }} -e "FLUSH PRIVILEGES;"
  changed_when: false

- name: Show MySQL root host entries
  ansible.builtin.command: >
    mysql -uroot -p{{ mysql_root_password }} -e
    "SELECT user,host FROM mysql.user WHERE user='root';"
  register: mysql_root_entries
  changed_when: false

- name: Debug MySQL root host entries
  ansible.builtin.debug:
    var: mysql_root_entries.stdout_lines