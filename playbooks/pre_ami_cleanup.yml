---
# =========================================================
# AMI Cleanup Playbook for RoboShop
# Covers:
#   - DB tier
#   - App tier
#   - Web tier
# =========================================================

# ---------------------------------------------------------
# 1. Stop DB services
# ---------------------------------------------------------
- name: Stop MongoDB for AMI
  hosts: comp_mongodb
  become: true
  gather_facts: false
  tasks:
    - name: Stop mongod
      ansible.builtin.systemd:
        name: mongod
        state: stopped

- name: Stop Redis for AMI
  hosts: comp_redis
  become: true
  gather_facts: false
