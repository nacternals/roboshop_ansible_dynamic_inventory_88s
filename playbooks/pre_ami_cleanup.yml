---
- name: Stop MongoDB for AMI
  hosts: comp_mongodb
  become: true
  tasks:
    - name: Stop mongod
      ansible.builtin.systemd:
        name: mongod
        state: stopped

- name: Stop Redis for AMI
  hosts: comp_redis
  become: true
  tasks:
    - name: Stop redis
      ansible.builtin.systemd:
        name: redis
        state: stopped

- name: Stop MySQL for AMI
  hosts: comp_mysql
  become: true
  tasks:
    - name: Stop mysqld
      ansible.builtin.systemd:
        name: mysqld
        state: stopped

- name: Stop RabbitMQ for AMI
  hosts: comp_rabbitmq
  become: true
  tasks:
    - name: Stop rabbitmq-server
      ansible.builtin.systemd:
        name: rabbitmq-server
        state: stopped

- name: Common cleanup for AMI (DB tier)
  hosts: tier_db
  become: true
  tasks:
    - name: Clean yum cache
      ansible.builtin.yum:
        name: "*"
        state: latest
        update_cache: false
      register: yum_result
      failed_when: false

    - name: Remove yum cache dirs
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/cache/yum
        - /var/tmp/yum-*

    - name: Clean temp dirs
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp
        - /var/tmp

    - name: Recreate temp dirs with correct perms
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        mode: "{{ item.mode }}"
      loop:
        - { path: "/tmp", mode: "1777" }
        - { path: "/var/tmp", mode: "1777" }

    - name: remove cloud-init state (recommended for AMI baking)
      ansible.builtin.file:
        path: /var/lib/cloud
        state: absent
      ignore_errors: true
