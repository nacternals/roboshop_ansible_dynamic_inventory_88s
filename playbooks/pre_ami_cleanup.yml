# ---------------------------------------------------------
# 4. Common cleanup for DB tier
# ---------------------------------------------------------
- name: Common cleanup for DB tier
  hosts: tier_db
  become: true
  gather_facts: true
  tasks:
    - name: Clean package manager cache (dnf/yum)
      ansible.builtin.shell: |
        dnf clean all || yum clean all || true
      args:
        executable: /bin/bash
      changed_when: false

    - name: Remove package cache directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/cache/dnf
        - /var/cache/yum

    - name: Remove temp directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp
        - /var/tmp

    - name: Recreate temp directories with correct permissions
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        mode: "{{ item.mode }}"
      loop:
        - { path: "/tmp", mode: "1777" }
        - { path: "/var/tmp", mode: "1777" }

    - name: Truncate log files
      ansible.builtin.shell: |
        find /var/log -type f -exec truncate -s 0 {} \; || true
      args:
        executable: /bin/bash
      changed_when: false

    - name: Remove cloud-init state
      ansible.builtin.file:
        path: /var/lib/cloud
        state: absent
      ignore_errors: true

    - name: Remove SSH host keys
      ansible.builtin.shell: |
        rm -f /etc/ssh/ssh_host_*
      args:
        executable: /bin/bash
      changed_when: false

    - name: Reset machine-id
      ansible.builtin.shell: |
        truncate -s 0 /etc/machine-id
        rm -f /var/lib/dbus/machine-id
        ln -s /etc/machine-id /var/lib/dbus/machine-id
      args:
        executable: /bin/bash
      changed_when: false

    - name: Clear root bash history
      ansible.builtin.shell: |
        cat /dev/null > /root/.bash_history || true
      args:
        executable: /bin/bash
      changed_when: false

    - name: Sync filesystem
      ansible.builtin.command: sync
      changed_when: false


# ---------------------------------------------------------
# 5. Common cleanup for APP tier
# ---------------------------------------------------------
- name: Common cleanup for APP tier
  hosts: tier_app
  become: true
  gather_facts: true
  tasks:
    - name: Clean package manager cache (dnf/yum)
      ansible.builtin.shell: |
        dnf clean all || yum clean all || true
      args:
        executable: /bin/bash
      changed_when: false

    - name: Remove package cache directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/cache/dnf
        - /var/cache/yum

    - name: Remove temp directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp
        - /var/tmp

    - name: Recreate temp directories with correct permissions
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        mode: "{{ item.mode }}"
      loop:
        - { path: "/tmp", mode: "1777" }
        - { path: "/var/tmp", mode: "1777" }

    - name: Truncate log files
      ansible.builtin.shell: |
        find /var/log -type f -exec truncate -s 0 {} \; || true
      args:
        executable: /bin/bash
      changed_when: false

    - name: Remove application temporary artifacts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/ansible
        - /tmp/ansible*
        - /root/.ansible/tmp
      ignore_errors: true

    - name: Remove cloud-init state
      ansible.builtin.file:
        path: /var/lib/cloud
        state: absent
      ignore_errors: true

    - name: Remove SSH host keys
      ansible.builtin.shell: |
        rm -f /etc/ssh/ssh_host_*
      args:
        executable: /bin/bash
      changed_when: false

    - name: Reset machine-id
      ansible.builtin.shell: |
        truncate -s 0 /etc/machine-id
        rm -f /var/lib/dbus/machine-id
        ln -s /etc/machine-id /var/lib/dbus/machine-id
      args:
        executable: /bin/bash
      changed_when: false

    - name: Clear root bash history
      ansible.builtin.shell: |
        cat /dev/null > /root/.bash_history || true
      args:
        executable: /bin/bash
      changed_when: false

    - name: Clear app user bash history if exists
      ansible.builtin.shell: |
        cat /dev/null > /home/roboshop/.bash_history || true
      args:
        executable: /bin/bash
      changed_when: false
      ignore_errors: true

    - name: Sync filesystem
      ansible.builtin.command: sync
      changed_when: false


